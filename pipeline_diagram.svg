<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="600" viewBox="0 0 1280 600" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#5b6470"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="40" y="52" font-size="30" font-weight="700" fill="#1f2733">멘토 스캐폴딩 파이프라인</text>
  <text x="40" y="82" font-size="16" fill="#7a828d">유저 상황 → 멘토 3인 선택 → 병렬 응답 생성 → 다양성 평가 → 결과</text>

  <!-- ===== Main stage boxes (top row) ===== -->
  <!-- 1. 유저 상황 -->
  <g filter="url(#shadow)">
    <rect x="40" y="130" width="170" height="78" rx="14" fill="#eef1f5" stroke="#c9d0d9" stroke-width="1.5"/>
  </g>
  <text x="125" y="166" text-anchor="middle" font-size="19" font-weight="700" fill="#2b3542">유저 상황</text>
  <text x="125" y="190" text-anchor="middle" font-size="13" fill="#7a828d">카테고리·태그·상품</text>

  <!-- 2. 멘토 선택 -->
  <g filter="url(#shadow)">
    <rect x="290" y="130" width="200" height="78" rx="14" fill="#e7f0ff" stroke="#9cbef0" stroke-width="1.5"/>
  </g>
  <text x="390" y="166" text-anchor="middle" font-size="19" font-weight="700" fill="#1f4e9b">① 멘토 선택</text>
  <text x="390" y="190" text-anchor="middle" font-size="13" fill="#5577aa">select_mentors.py</text>

  <!-- 3. 응답 생성 -->
  <g filter="url(#shadow)">
    <rect x="570" y="130" width="200" height="78" rx="14" fill="#e6f6ec" stroke="#94d3ab" stroke-width="1.5"/>
  </g>
  <text x="670" y="160" text-anchor="middle" font-size="19" font-weight="700" fill="#1d7a45">② 응답 생성</text>
  <text x="670" y="183" text-anchor="middle" font-size="13" fill="#3f9d68">병렬 LLM 호출</text>
  <text x="670" y="200" text-anchor="middle" font-size="12" fill="#5aa97d">generate_responses.py</text>

  <!-- 4. 다양성 평가 -->
  <g filter="url(#shadow)">
    <rect x="850" y="130" width="200" height="78" rx="14" fill="#f1ebfb" stroke="#c3a7ec" stroke-width="1.5"/>
  </g>
  <text x="950" y="160" text-anchor="middle" font-size="19" font-weight="700" fill="#6a35b8">③ 다양성 평가</text>
  <text x="950" y="183" text-anchor="middle" font-size="13" fill="#8a5fc9">KR-SBERT 코사인 거리</text>
  <text x="950" y="200" text-anchor="middle" font-size="12" fill="#9d78d4">임계값 0.25</text>

  <!-- 5. 결과 -->
  <g filter="url(#shadow)">
    <rect x="1130" y="130" width="120" height="78" rx="14" fill="#2b3542" stroke="#2b3542"/>
  </g>
  <text x="1190" y="166" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">결과</text>
  <text x="1190" y="190" text-anchor="middle" font-size="12" fill="#c9d0d9">멘토3 + 응답</text>

  <!-- ===== Arrows between main boxes ===== -->
  <line x1="212" y1="169" x2="284" y2="169" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="492" y1="169" x2="564" y2="169" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="772" y1="169" x2="844" y2="169" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1052" y1="169" x2="1124" y2="169" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===== Mentor detail under 멘토 선택 ===== -->
  <!-- connector from 멘토 선택 box down -->
  <line x1="390" y1="208" x2="390" y2="262" stroke="#9cbef0" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="200" y1="262" x2="580" y2="262" stroke="#9cbef0" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="200" y1="262" x2="200" y2="300" stroke="#9cbef0" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="390" y1="262" x2="390" y2="300" stroke="#9cbef0" stroke-width="2" stroke-dasharray="5,4"/>
  <line x1="580" y1="262" x2="580" y2="300" stroke="#9cbef0" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- 최애 -->
  <g filter="url(#shadow)">
    <rect x="105" y="300" width="190" height="96" rx="12" fill="#ffe9ef" stroke="#f3a7bd" stroke-width="1.5"/>
  </g>
  <text x="200" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#c2335c">최애</text>
  <text x="200" y="360" text-anchor="middle" font-size="13" fill="#9a5570">평소 가장 좋아하는 멘토</text>
  <text x="200" y="380" text-anchor="middle" font-size="12.5" fill="#b56a86">온보딩 퀴즈로 고정</text>

  <!-- 맥락 -->
  <g filter="url(#shadow)">
    <rect x="295" y="300" width="190" height="96" rx="12" fill="#e7f0ff" stroke="#9cbef0" stroke-width="1.5"/>
  </g>
  <text x="390" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#1f4e9b">맥락</text>
  <text x="390" y="360" text-anchor="middle" font-size="13" fill="#4a6ba3">상황에 맞는 멘토</text>
  <text x="390" y="380" text-anchor="middle" font-size="12.5" fill="#5577aa">벡터 의미검색 (FAISS ANN)</text>

  <!-- 반대 -->
  <g filter="url(#shadow)">
    <rect x="485" y="300" width="190" height="96" rx="12" fill="#fff2e2" stroke="#f0c089" stroke-width="1.5"/>
  </g>
  <text x="580" y="333" text-anchor="middle" font-size="20" font-weight="700" fill="#b9711a">반대</text>
  <text x="580" y="360" text-anchor="middle" font-size="13" fill="#9c6a2c">일부러 결이 다른 멘토</text>
  <text x="580" y="380" text-anchor="middle" font-size="12.5" fill="#b5832f">정합점수 최저 아키타입</text>

  <!-- note: distinct type -->
  <rect x="105" y="424" width="570" height="40" rx="10" fill="#f7f8fa" stroke="#dde2e8" stroke-width="1"/>
  <text x="390" y="449" text-anchor="middle" font-size="13.5" fill="#5b6470">★ 3인이 서로 다른 소비 Type(1~5)을 갖도록 강제 → 응답 다양성 보장</text>

  <!-- ===== Result detail under 다양성 평가/결과 ===== -->
  <line x1="950" y1="208" x2="950" y2="300" stroke="#c3a7ec" stroke-width="2" stroke-dasharray="5,4"/>
  <g filter="url(#shadow)">
    <rect x="790" y="300" width="320" height="120" rx="12" fill="#faf7ff" stroke="#d9c6f2" stroke-width="1.5"/>
  </g>
  <text x="950" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#6a35b8">측정 지표</text>
  <text x="815" y="362" font-size="13.5" fill="#4b5260">· 다양성: 쌍별 코사인 거리 평균</text>
  <text x="815" y="386" font-size="13.5" fill="#4b5260">· 통과율 100% · Type 3종 100%</text>
  <text x="815" y="410" font-size="13.5" fill="#4b5260">· 응답 시간(선택/생성/전체)</text>

  <!-- footer -->
  <text x="40" y="558" font-size="12.5" fill="#a7adb6">최애 = 온보딩 고정 · 맥락 = 의미검색 · 반대 = 인지적 자극   |   3인 병렬 호출로 체감 응답시간 단축</text>
</svg>
